<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Registros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Sistema de Inventario</span>
            <div class="d-flex align-items-center">
                <span class="text-white me-3">Panel de Control</span>
                <a href="logout.php" class="btn btn-danger btn-sm">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Listado de Registros (Tabla: Productos)</h4>
            </div>
            <div class="card-body">
                
                <table class="table table-striped table-hover table-bordered mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre del Producto</th>
                            <th>Precio Unitario</th>
                            <th>Stock</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos">
                        <tr>
                            <td colspan="4" class="text-center text-muted">Cargando registros...</td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>
    </div>

    <script>
        // Al cargar la página, pedimos los datos mediante fetch
        fetch('get_productos.php')
            .then(response => {
                // Si el archivo PHP nos rebota (porque no hay sesión), nos manda al login
                if (response.redirected) {
                    window.location.href = response.url;
                    return;
                }
                return response.json();
            })
            .then(data => {
                const tbody = document.getElementById('tabla-productos');
                tbody.innerHTML = ''; // Limpiar el mensaje de "Cargando..."

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">No se encontraron registros.</td></tr>`;
                    return;
                }

                // Recorremos los datos que envió PHP y los dibujamos en la tabla HTML
                data.forEach(producto => {
                    const fila = document.createElement('tr');
                    
                    // Formatear precio a dos decimales
                    const precioFormateado = parseFloat(producto.precio).toFixed(2);

                    fila.innerHTML = `
                        <td>${producto.id}</td>
                        <td>${producto.nombre}</td>
                        <td>$${precioFormateado}</td>
                        <td>${producto.stock} u</td>
                    `;
                    tbody.appendChild(fila);
                });
            })
            .catch(error => console.error('Error al obtener datos:', error));
    </script>
</body>
</html>
